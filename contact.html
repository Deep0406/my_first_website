<body>
    <div class="hero">
        <header class="header">
            <nav>
                <h2 class="logo">Travel-India</h2>
                <ul>
                    <li><a href="index.html">Home</a></li>

                <form class="search-bar">
                    <input type="text" placeholder="Search Places">
                    <button type="submit">Search</button>
                </form>
            </nav>
        </header>

        <div class="body">
            <div class="main">
                <div class="pri">
                    <h2>Contact Us</h2>
                    <form action="" method="post">
                        <input type="text" name="name" placeholder="Enter Your Name" required>
                        
                        <input type="email" name="email" placeholder="Enter your E-mail" required>
                        
                        <input type="tel" name="mobile" placeholder="Mobile Number (10 digits)" pattern="[0-9]{10}" required>

                        <h4>Which place do you want to visit?</h4>

                        <div class="checkbox">
                            <div class="one">
                            <input type="checkbox" name="destination" value="mountain" id="one"><label>Mountain Destinations</label></div>
                            <div class="two">
                            <input type="checkbox" name="destination" value="beaches" id="two"><label>Beaches Destinations</label></div>
                            <div class="three">
                            <input type="checkbox" name="destination" value="heritage" id="three"><label>Heritage Sites</label></div>
                            <div class="four">
                            <input type="checkbox" name="destination" value="spiritual" id="four"><label>Spiritual Places</label></div>
                        </div>

                        <input type="text" name="custom_places" placeholder="Enter other places you want to visit" required>

                        <textarea name="additional_info" rows="5" placeholder="Any Additional Information? (OPTIONAL)"></textarea>
                        
                        <button type="submit">Submit</button>
                    </form>                    
                </div>
                <div class="sec">
                </div>
            </div>
        </div>

        <footer class="footer">

        </footer>
    </div>
</body>
